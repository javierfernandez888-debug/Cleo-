<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pizzería Cleo - Pedidos</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <header>
        <h1>Pizzería Cleo</h1>
        <p>¡Pedí tu PreLista fácil y rápido!</p>
        <!-- Logo de la gatita -->
        <img src="https://static.vecteezy.com/system/resources/previews/025/436/159/original/cat-sit-black-silhouette-domestic-pet-profile-cat-for-print-card-sticker-illustration-vector.jpg" 
             alt="Logo de Cleo" class="logo-gato">
    </header>

    <main>
        <form id="pedidoForm">
            <div id="menuRows"></div>
            <div class="pizza-row" id="direccionRow"></div>

            <button type="button" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
        </form>
    </main>

    <footer>
        <p>WhatsApp pedidos: <span id="whatsappDisplay"></span></p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>

</body>
</html>
